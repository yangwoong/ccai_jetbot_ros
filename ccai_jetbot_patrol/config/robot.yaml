patrol_node:
  ros__parameters:
    linear_speed: 0.04
    angular_speed: 0.16
    heartbeat_seconds: 2.0
    safe_stop_on_idle: true
    patrol_forward_seconds: 4.0
    patrol_turn_seconds: 1.2
    use_vision_cmd_vel: true
    vision_command_timeout_seconds: 0.8
    manual_move_seconds: 1.5
    manual_turn_seconds: 0.8
    speed_step: 0.2
    min_speed_scale: 0.3
    max_speed_scale: 2.0
    speed_ramp_seconds: 1.5
    speed_ramp_min_factor: 0.35
    manual_drive_slow_factor: 0.5
    locations_file: "data/locations.json"

jetbot_hardware_node:
  ros__parameters:
    enabled: true
    cmd_vel_topic: "/cmd_vel"
    motor_backend: "auto"
    motor_i2c_bus: -1
    motor_i2c_address: 0
    left_motor_channel: 1
    right_motor_channel: 2
    max_linear_speed: 0.05
    max_angular_speed: 0.22
    motor_output_scale: 0.35
    left_trim: -1.0
    right_trim: -1.0
    command_timeout_seconds: 1.0
    status_led_pin: -1
    status_led_active_high: true
    oled_enabled: true
    oled_bus: -1
    oled_refresh_seconds: 2.0

camera_node:
  ros__parameters:
    enabled: true
    camera_index: 0
    camera_device: ""
    camera_url: ""
    camera_url_timeout_seconds: 1.5
    camera_mode: "csi"
    camera_backend: "auto"
    use_gstreamer: true
    force_v4l2: true
    capture_width: 640
    capture_height: 480
    csi_sensor_id: 0
    csi_sensor_mode: 3
    csi_capture_width: 816
    csi_capture_height: 616
    csi_fps: 30
    csi_flip_method: 0
    width: 320
    height: 240
    fps: 10.0
    jpeg_quality: 45
    reopen_after_failures: 5
    capture_retry_seconds: 3.0
    max_open_attempts: 0
    open_probe_frames: 8
    reject_invalid_frames: true
    reject_invalid_on_open: false
    invalid_green_ratio: 0.85
    invalid_min_stddev: 8.0
    debug_frame_path: "/tmp/ccai_camera_last_invalid.jpg"
    output_topic: "/image_raw/compressed"

vision_nav_node:
  ros__parameters:
    enabled: true
    # false: D435i (depth_nav_node below) is connected and drives instead -
    # CSI stays on for YOLO/follow-person/debug overlay, it just stops
    # contributing patrol/manual-forward drive commands (its floor-obstacle
    # heuristics are meaningless pointed at a ceiling). See depth_nav_node's
    # docstring and docs/navigation_roadmap.md.
    drive_enabled: false
    image_topic: "/image_raw/compressed"
    linear_speed: 0.045
    turn_speed: 0.16
    follow_linear_speed: 0.04
    max_angular_speed: 0.22
    obstacle_stop_edge_density: 0.16
    min_valid_frame_seconds: 1.0
    person_detect_every_n_frames: 5
    follow_target_area: 0.18
    follow_min_area: 0.035
    yolo_model_path: "data/models/yolov8n.onnx"
    yolo_engine_path: "data/models/yolov8n.engine"
    yolo_input_size: 320
    yolo_confidence: 0.45
    yolo_nms_threshold: 0.45
    yolo_detect_every_n_frames: 3
    obstacle_box_min_area: 0.05
    obstacle_path_bottom_fraction: 0.5
    obstacle_trigger_min_interval_seconds: 4.0
    floor_color_diff_threshold: 130.0
    bottom_change_threshold: 35.0
    debug_image_enabled: true
    obstacle_avoidance_hold_seconds: 1.0
    obstacle_clear_confirm_frames: 5
    steer_direction_noise_floor: 0.01
    steer_smoothing_alpha: 0.4
    obstacle_avoidance_max_seconds: 6.0
    obstacle_turn_pulse_seconds: 0.3
    obstacle_pause_seconds: 0.2
    speed_ramp_seconds: 1.5
    speed_ramp_min_factor: 0.35
    camera_alert_min_interval_seconds: 10.0

depth_nav_node:
  ros__parameters:
    # true: D435i connected and driving patrol/manual-forward. Also requires
    # CCAI_ENABLE_DEPTH_NAV=1 at launch (see host_docker_run.sh/.env).
    enabled: true
    depth_image_topic: "/camera/camera/depth/image_rect_raw"
    color_image_topic: "/camera/camera/color/image_raw"
    debug_image_enabled: true
    depth_scale_to_meters: 0.001
    min_valid_depth_m: 0.2
    max_valid_depth_m: 4.0
    linear_speed: 0.045
    turn_speed: 0.16
    max_angular_speed: 0.22
    obstacle_stop_distance_m: 0.45
    min_valid_frame_seconds: 1.0
    obstacle_avoidance_hold_seconds: 1.0
    obstacle_clear_confirm_frames: 5
    obstacle_avoidance_max_seconds: 6.0
    obstacle_turn_pulse_seconds: 0.3
    obstacle_pause_seconds: 0.2
    steer_smoothing_alpha: 0.4
    speed_ramp_seconds: 1.5
    speed_ramp_min_factor: 0.35
    camera_alert_min_interval_seconds: 10.0

vlm_client_node:
  ros__parameters:
    api_base_url: ""
    api_key: ""
    model: ""
    image_topic: "/image_raw/compressed"
    trigger_topic: "/ccai/vlm_trigger"
    prompt: "You are monitoring a patrol robot's camera. Reply with exactly one line: start with 'RISK:' if you see something dangerous or unusual (person down, fire, smoke, collision risk, intruder, blocked path), otherwise start with 'NORMAL:'. Follow the prefix with a summary in Korean of 50 characters or fewer. No markdown, no extra lines."
    summary_max_chars: 50
    min_interval_seconds: 5.0
    request_timeout_seconds: 35.0
    error_event_min_interval_seconds: 30.0

llm_control_node:
  ros__parameters:
    api_base_url: ""
    api_key: ""
    model: ""
    request_timeout_seconds: 20.0
    health_check_seconds: 30.0

web_chat_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 8080

telegram_bridge_node:
  ros__parameters:
    bot_token: ""
    allowed_chat_id: ""
    poll_seconds: 2.0
    notify_startup: true

ota_agent_node:
  ros__parameters:
    manifest_url: ""
    current_version_file: "data/current_version.txt"
    check_interval_seconds: 300.0
    auto_apply: false
    workdir: "."
