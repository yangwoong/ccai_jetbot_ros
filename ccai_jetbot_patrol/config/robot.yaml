patrol_node:
  ros__parameters:
    linear_speed: 0.04
    angular_speed: 0.16
    heartbeat_seconds: 2.0
    safe_stop_on_idle: true
    patrol_forward_seconds: 4.0
    patrol_turn_seconds: 1.2
    use_vision_cmd_vel: true
    vision_command_timeout_seconds: 0.8

jetbot_hardware_node:
  ros__parameters:
    enabled: true
    cmd_vel_topic: "/cmd_vel"
    motor_backend: "auto"
    motor_i2c_bus: -1
    motor_i2c_address: 0
    left_motor_channel: 1
    right_motor_channel: 2
    max_linear_speed: 0.5
    max_angular_speed: 2.0
    motor_output_scale: 0.35
    left_trim: 1.0
    right_trim: 1.0
    command_timeout_seconds: 1.0
    status_led_pin: -1
    status_led_active_high: true
    oled_enabled: true
    oled_bus: -1
    oled_refresh_seconds: 2.0

camera_node:
  ros__parameters:
    enabled: true
    camera_index: 0
    camera_device: ""
    camera_mode: "usb"
    camera_backend: "auto"
    use_gstreamer: false
    force_v4l2: true
    capture_width: 640
    capture_height: 480
    csi_sensor_id: 0
    csi_sensor_mode: 3
    csi_capture_width: 816
    csi_capture_height: 616
    csi_fps: 30
    csi_flip_method: 0
    width: 320
    height: 240
    fps: 5.0
    jpeg_quality: 45
    reopen_after_failures: 5
    capture_retry_seconds: 3.0
    max_open_attempts: 0
    open_probe_frames: 8
    reject_invalid_frames: true
    invalid_green_ratio: 0.85
    invalid_min_stddev: 8.0
    debug_frame_path: "/tmp/ccai_camera_last_invalid.jpg"
    output_topic: "/image_raw/compressed"

vision_nav_node:
  ros__parameters:
    enabled: true
    image_topic: "/image_raw/compressed"
    linear_speed: 0.045
    turn_speed: 0.16
    follow_linear_speed: 0.04
    max_angular_speed: 0.22
    obstacle_stop_edge_density: 0.16
    min_valid_frame_seconds: 1.0
    person_detect_every_n_frames: 5
    follow_target_area: 0.18
    follow_min_area: 0.035

vlm_client_node:
  ros__parameters:
    api_base_url: ""
    api_key: ""
    model: ""
    image_topic: "/image_raw/compressed"
    prompt: "Describe patrol-relevant safety issues in this robot camera image. Be concise."
    min_interval_seconds: 3.0
    request_timeout_seconds: 20.0

llm_control_node:
  ros__parameters:
    api_base_url: ""
    api_key: ""
    model: ""
    request_timeout_seconds: 20.0
    health_check_seconds: 30.0

web_chat_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 8080

telegram_bridge_node:
  ros__parameters:
    bot_token: ""
    allowed_chat_id: ""
    poll_seconds: 2.0

ota_agent_node:
  ros__parameters:
    manifest_url: ""
    current_version_file: "data/current_version.txt"
    check_interval_seconds: 300.0
    auto_apply: false
    workdir: "."
