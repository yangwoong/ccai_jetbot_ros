patrol_node:
  ros__parameters:
    linear_speed: 0.12
    angular_speed: 0.35
    heartbeat_seconds: 2.0
    safe_stop_on_idle: true
    patrol_forward_seconds: 4.0
    patrol_turn_seconds: 1.2

jetbot_hardware_node:
  ros__parameters:
    enabled: true
    cmd_vel_topic: "/cmd_vel"
    motor_backend: "auto"
    motor_i2c_bus: 1
    motor_i2c_address: 96
    left_motor_channel: 1
    right_motor_channel: 2
    max_linear_speed: 0.25
    max_angular_speed: 1.2
    left_trim: 1.0
    right_trim: 1.0
    command_timeout_seconds: 1.0
    status_led_pin: -1
    status_led_active_high: true
    oled_enabled: true
    oled_bus: 1
    oled_refresh_seconds: 2.0

camera_node:
  ros__parameters:
    enabled: true
    camera_index: 0
    use_gstreamer: false
    force_v4l2: true
    width: 320
    height: 240
    fps: 5.0
    jpeg_quality: 45
    output_topic: "/image_raw/compressed"

vlm_client_node:
  ros__parameters:
    api_base_url: ""
    api_key: ""
    model: ""
    image_topic: "/image_raw/compressed"
    prompt: "Describe patrol-relevant safety issues in this robot camera image. Be concise."
    min_interval_seconds: 3.0
    request_timeout_seconds: 20.0

llm_control_node:
  ros__parameters:
    api_base_url: ""
    api_key: ""
    model: ""
    request_timeout_seconds: 20.0
    health_check_seconds: 30.0

web_chat_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 8080

telegram_bridge_node:
  ros__parameters:
    bot_token: ""
    allowed_chat_id: ""
    poll_seconds: 2.0

ota_agent_node:
  ros__parameters:
    manifest_url: ""
    current_version_file: "data/current_version.txt"
    check_interval_seconds: 300.0
    auto_apply: false
    workdir: "."
